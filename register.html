---
layout: default
title: Register — LinsaFTW
page_id: register
---

<div class="auth-page">
  <div class="auth-box">
    <h1 class="auth-title">Register</h1>
    <p class="auth-subtitle">// Create an account</p>

    <div class="flash-container"></div>

    <form id="register-form" class="editor-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username" required minlength="3" maxlength="50">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" required minlength="8">
      </div>
      <div class="mt-8">
        <button type="submit" class="btn" style="width:100%;justify-content:center">
          <img src="/assets/svgs/user-plus.svg" width="14" height="14" alt=""> Register
        </button>
      </div>
    </form>

    <p class="text-muted mt-16" style="font-size:11px">
      Have an account? <a href="/login.html" style="color:inherit">Login</a>
    </p>
  </div>
</div>
